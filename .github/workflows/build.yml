name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: 0 3 1 * *
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build:
          - x86_64
          - x86_64-beta
          - x86_64-nightly
          - i686
          - macos
          - win64
          - win32
        include:
          - build: x86_64
            os: ubuntu-latest
            rust: stable
            target: x86_64-unknown-linux-gnu
          - build: x86_64-beta
            os: ubuntu-latest
            rust: beta
            target: x86_64-unknown-linux-gnu
          - build: x86_64-nightly
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-gnu
          - build: i686
            os: ubuntu-latest
            rust: stable
            target: i686-unknown-linux-gnu
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
          - build: win32
            os: windows-latest
            rust: stable
            target: i686-pc-windows-msvc
          - build: win64
            os: windows-latest
            rust: stable
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - name: Install Rust (rustup)
        env:
          RUST_TOOLCHAIN: ${{ matrix.rust }}
        run: rustup update "$RUST_TOOLCHAIN" --no-self-update && rustup default "$RUST_TOOLCHAIN"
        shell: bash
      - name: Add target
        env:
          RUST_TARGET: ${{ matrix.target }}
        run: rustup target add "$RUST_TARGET"
        shell: bash
      - run: rustup component add clippy rustfmt
      - run: brew install automake
        if: matrix.build == 'macos'
        name: Install automake
      - run: cargo fmt --all -- --check
        if: matrix.build == 'x86_64'
        name: Check formatting
      - run: cargo clippy --workspace --tests --examples -- -D warnings
        name: Run clippy
      - run: cargo build --workspace
        name: Build
      - run: cargo test --workspace
        name: Run tests
      - run: |
          cargo update -Z minimal-versions
          cargo build --workspace
        if: matrix.rust == 'nightly'
        name: Check minimal versions
      - run: |
          cargo run -p c-ares --example event_thread
          cargo run -p c-ares --example getaddrinfo
          cargo run -p c-ares --example version
        name: Run c-ares examples
      - run: |
          cargo run -p c-ares-resolver --example blocking
          cargo run -p c-ares-resolver --example callback
          cargo run -p c-ares-resolver --example futures
          cargo run -p c-ares-resolver --example dnsrec
        name: Run c-ares-resolver examples

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --features vendored --target x86_64-unknown-linux-gnu -- --include-ignored
        env:
          LLVM_COV_FLAGS: "--show-branch-summary=false"
